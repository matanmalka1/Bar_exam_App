services:
  - type: web
    name: bar-exam-api
    runtime: python
    rootDir: backend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python scripts/import_questions.py --input-dir outputs && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: AUTH_ALGORITHM
        value: HS256
      - key: AUTH_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
