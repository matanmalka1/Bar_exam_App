services:
  - type: web
    name: bar-exam-api
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic -c alembic.ini upgrade head && python scripts/import_questions.py --input-dir outputs && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: DATABASE_URL
        fromDatabase:
          name: bar-exam-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://bar-exam-frontend.onrender.com
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: AUTH_ALGORITHM
        value: HS256
      - key: AUTH_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: AUTH_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: REFRESH_COOKIE_NAME
        value: refresh_token
      - key: REFRESH_COOKIE_PATH
        value: /api/v1/auth
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: FRONTEND_PASSWORD_RESET_URL
        value: https://bar-exam-frontend.onrender.com/reset-password
      - key: PASSWORD_RESET_DEV_LOG
        value: "false"
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: matan1391@gmail.com
      - key: BREVO_SENDER_NAME
        value: "איפוס סיסמה - בר עורכי דין"
      - key: BREVO_TEMPLATE_PASSWORD_RESET
        value: "4"

databases:
  - name: bar-exam-db
    databaseName: bar_exam_study
    user: bar_exam_user
    plan: free
