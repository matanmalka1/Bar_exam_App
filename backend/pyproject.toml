[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [
    ".venv",
    "outputs",
    "uploads",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
]

[tool.ruff.lint.per-file-ignores]
"scripts/import_questions.py" = ["E402"]
"scripts/pipeline.py" = ["UP009", "UP045"]
"tests/*.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pylint.main]
py-version = "3.12"
ignore = [
    ".venv",
    "outputs",
    "uploads",
]
jobs = 1
persistent = false

[tool.pylint.format]
max-line-length = 120

[tool.pylint.messages_control]
disable = [
    "consider-using-enumerate",
    "duplicate-code",
    "expression-not-assigned",
    "import-outside-toplevel",
    "invalid-name",
    "non-ascii-name",
    "no-member",
    "not-callable",
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    "redefined-outer-name",
    "too-few-public-methods",
    "too-many-branches",
    "too-many-instance-attributes",
    "too-many-locals",
    "too-many-statements",
    "trailing-newlines",
    "unused-argument",
    "unused-import",
    "wrong-import-position",
]

[tool.pylint.typecheck]
ignored-modules = ["pypdfium2"]

[tool.pylint.design]
max-args = 8
max-positional-arguments = 8

[tool.pytest.ini_options]
pythonpath = ["."]
